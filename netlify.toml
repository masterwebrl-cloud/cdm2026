[build]
  functions = "netlify/functions"
  publish = "."

# /api/scores -> Netlify Function scores
[[redirects]]
  from = "/api/scores"
  to = "/.netlify/functions/scores"
  status = 200

# /api/chat -> Netlify Function chat (GET messages + POST nouveau message)
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

# /api/news -> Netlify Function news (bandeau d'actualités défilant)
[[redirects]]
  from = "/api/news"
  to = "/.netlify/functions/news"
  status = 200
